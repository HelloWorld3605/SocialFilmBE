spring.datasource.url=jdbc:h2:mem:filmbe;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.flyway.enabled=false
app.cors.allowed-origins=http://localhost:5173
app.jwt.secret=local-test-secret-local-test-secret-123456789
app.jwt.expiration-minutes=60
app.frontend-url=http://localhost:5173
app.mail.dev-mode=false
app.verification.token-expiration-minutes=15
app.phim-api.base-url=https://phimapi.com
app.phim-api.image-proxy-url=https://phimapi.com/image.php
app.cache.redis.key-prefix=filmbe-test::
app.cache.redis.default-ttl=5m
app.cache.redis.home-ttl=5m
app.cache.redis.latest-ttl=3m
app.cache.redis.list-ttl=10m
app.cache.redis.search-ttl=2m
app.cache.redis.taxonomy-ttl=12h
app.cache.redis.movie-ttl=30m
app.cache.redis.tmdb-ttl=1h
app.cache.watch-progress.redis-ttl=7d
app.cache.watch-progress.db-flush-interval=10s
app.cache.watch-progress.db-flush-position-delta-seconds=10
app.cache.watch-progress.scheduler-delay=45s
app.cache.watch-progress.scheduler-batch-size=200
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test@example.com
spring.mail.password=test
cloudinary.cloud-name=test
cloudinary.api-key=test
cloudinary.api-secret=test
