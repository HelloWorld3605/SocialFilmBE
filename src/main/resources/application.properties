spring.application.name=FilmBE

server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/film?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:50MB}

spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.ssl.trust=${SPRING_MAIL_SMTP_SSL_TRUST:}


spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=${REDIS_TIMEOUT:2s}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.jwt.secret=${APP_JWT_SECRET:change-me-to-a-long-random-secret-key-for-local-dev-123456789}
app.jwt.expiration-minutes=${APP_JWT_EXPIRATION_MINUTES:10080}

app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
app.mail.dev-mode=${APP_MAIL_DEV_MODE:false}
app.verification.token-expiration-minutes=${APP_VERIFICATION_TOKEN_EXPIRATION_MINUTES:15}
app.password-reset.token-expiration-minutes=${APP_PASSWORD_RESET_TOKEN_EXPIRATION_MINUTES:60}
app.phim-api.base-url=${APP_PHIM_API_BASE_URL:https://phimapi.com}
app.phim-api.image-proxy-url=${APP_PHIM_API_IMAGE_PROXY_URL:https://phimapi.com/image.php}
app.cache.redis.key-prefix=${APP_CACHE_REDIS_KEY_PREFIX:filmbe::}
app.cache.redis.default-ttl=${APP_CACHE_REDIS_DEFAULT_TTL:5m}
app.cache.redis.home-ttl=${APP_CACHE_REDIS_HOME_TTL:5m}
app.cache.redis.latest-ttl=${APP_CACHE_REDIS_LATEST_TTL:3m}
app.cache.redis.list-ttl=${APP_CACHE_REDIS_LIST_TTL:10m}
app.cache.redis.search-ttl=${APP_CACHE_REDIS_SEARCH_TTL:2m}
app.cache.redis.taxonomy-ttl=${APP_CACHE_REDIS_TAXONOMY_TTL:12h}
app.cache.redis.movie-ttl=${APP_CACHE_REDIS_MOVIE_TTL:30m}
app.cache.redis.tmdb-ttl=${APP_CACHE_REDIS_TMDB_TTL:1h}
app.cache.watch-progress.redis-ttl=${APP_CACHE_WATCH_PROGRESS_REDIS_TTL:7d}
app.cache.watch-progress.db-flush-interval=${APP_CACHE_WATCH_PROGRESS_DB_FLUSH_INTERVAL:10s}
app.cache.watch-progress.db-flush-position-delta-seconds=${APP_CACHE_WATCH_PROGRESS_DB_FLUSH_POSITION_DELTA_SECONDS:10}
app.cache.watch-progress.scheduler-delay=${APP_CACHE_WATCH_PROGRESS_SCHEDULER_DELAY:45s}
app.cache.watch-progress.scheduler-batch-size=${APP_CACHE_WATCH_PROGRESS_SCHEDULER_BATCH_SIZE:200}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
